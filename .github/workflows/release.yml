name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Build
        run: ./gradlew build --no-daemon --warning-mode=all

      - name: Validate plugins
        run: ./gradlew validatePlugins --no-daemon

      - name: Upload plugin JAR
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plugin-jar
          path: build/libs/*.jar
          retention-days: 90

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/reports/codenarc/
          retention-days: 30

      - name: Create reports archive
        if: success()
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf gradle-pitest-plugin-${VERSION}-reports.tar.gz \
            build/reports/tests/ \
            build/reports/codenarc/ \
            2>/dev/null || true

      - name: Upload reports archive
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-reports
          path: gradle-pitest-plugin-*-reports.tar.gz
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download plugin JAR
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: plugin-jar
          path: artifacts/

      - name: Download reports archive
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-reports

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the section between two version headers.
          # Supports both "## [X.Y.Z]" (Keep a Changelog) and "## X.Y.Z - date" (upstream format).
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if ($0 ~ ver) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          # Fallback if no section found for this version.
          if [ ! -s release-notes.md ]; then
            echo "No release notes found for version $VERSION in CHANGELOG.md."
            {
              echo "## What's Changed"
              echo ""
              echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details."
            } > release-notes.md
          fi

          echo "--- Release notes for $VERSION ---"
          cat release-notes.md

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "gradle-pitest-plugin ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            artifacts/*.jar \
            gradle-pitest-plugin-*-reports.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
